<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>籃球戰術板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
  }

  #header h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #e8720c;
  }

  .toggle {
    display: flex;
    background: #111;
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
  }

  .toggle button {
    padding: 7px 18px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #555;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    letter-spacing: 1px;
    touch-action: manipulation;
  }

  .toggle button.active { background: #e8720c; color: #fff; }

  /* ── Canvas ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0d0d0d;
  }

  #c { position: absolute; top: 0; left: 0; display: block; touch-action: none; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 16px;
    height: 72px;
    flex-shrink: 0;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
  }

  .token-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .player-token {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: #fff;
    cursor: grab;
    user-select: none;
    touch-action: none;
    flex-shrink: 0;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .player-token.offense {
    background: #e8720c;
    box-shadow: 0 0 0 2px rgba(255,176,96,0.5);
  }

  .player-token.defense {
    background: #3a9fd6;
    box-shadow: 0 0 0 2px rgba(144,212,255,0.5);
  }

  .player-token:active { transform: scale(0.9); }

  /* Basketball token */
  .ball-token {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    cursor: grab;
    user-select: none;
    touch-action: none;
    flex-shrink: 0;
    background: rgba(232,130,20,0.12);
    border: 2px dashed rgba(232,130,20,0.45);
    transition: transform 0.1s;
  }

  .ball-token:active { transform: scale(0.9); }

  .token-label {
    font-size: 10px;
    font-weight: 600;
    color: #555;
    letter-spacing: 0.5px;
  }

  /* Divider between token group and action group */
  .toolbar-divider {
    width: 1px;
    height: 36px;
    background: #2e2e2e;
    flex-shrink: 0;
    margin: 0 4px;
  }

  .tool-btn {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    border: 1.5px solid #333;
    background: transparent;
    color: #666;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    touch-action: manipulation;
    flex-shrink: 0;
  }

  .tool-btn:hover { border-color: #e8720c; color: #e8720c; }

  #trash-zone {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    border: 2px dashed #333;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #trash-zone img {
    width: 26px;
    height: 26px;
    pointer-events: none;
    filter: grayscale(1) brightness(0.55);
    transition: filter 0.2s;
  }

  #trash-zone.highlight {
    border-color: #e05050;
    background: rgba(224,80,80,0.12);
  }

  #trash-zone.highlight img {
    filter: grayscale(0) sepia(1) saturate(4) hue-rotate(310deg) brightness(1.1);
  }

  /* ── Drag ghost ── */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 17px;
    color: #fff;
    transform: translate(-50%, -50%);
    transition: opacity 0.15s;
  }
</style>
</head>
<body>

<div id="app">
  <header id="header">
    <h1>戰術板</h1>
    <div class="toggle">
      <button id="btn-half" class="active" onclick="setCourt('half')">半場</button>
      <button id="btn-full" onclick="setCourt('full')">全場</button>
    </div>
  </header>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div id="toolbar">
    <!-- Drag sources -->
    <div class="token-wrap">
      <div class="player-token offense" id="tok-off">攻</div>
      <span class="token-label">進攻</span>
    </div>
    <div class="token-wrap">
      <div class="player-token defense" id="tok-def">守</div>
      <span class="token-label">防守</span>
    </div>
    <div class="token-wrap">
      <div class="ball-token" id="tok-ball">
        <img id="tok-ball-img" style="width:34px;height:34px;pointer-events:none;display:block;">
      </div>
      <span class="token-label">籃球</span>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Action buttons -->
    <div class="token-wrap">
      <button class="tool-btn" onclick="undo()">↩</button>
      <span class="token-label">復原</span>
    </div>
    <div class="token-wrap">
      <button class="tool-btn" onclick="clearAll()">✕</button>
      <span class="token-label">清空</span>
    </div>
    <div class="token-wrap">
      <div id="trash-zone" title="拖曳至此刪除"><img src="garbage-can.svg" alt="刪除"></div>
      <span class="token-label">刪除</span>
    </div>
  </div>
</div>

<!-- DOM ghost element that follows the cursor -->
<div id="drag-ghost"></div>

<script>
'use strict';

// ── Basketball SVG image ───────────────────────────────────────
const BALL_URL = 'basketball.svg';
const basketballImg = new Image();
basketballImg.onload = () => redraw();
basketballImg.src = BALL_URL;

// ── Canvas setup ──────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvas-wrap');
const ghost   = document.getElementById('drag-ghost');
const trashEl = document.getElementById('trash-zone');

// Set toolbar ball image
document.getElementById('tok-ball-img').src = BALL_URL;

let courtType = 'half';

// Current transform (computed before each draw call)
let T = { scale: 1, ox: 0, oy: 0 };

function isPortraitFull() {
  return courtType === 'full' && (wrap.clientWidth || 1) < (wrap.clientHeight || 1);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const W   = wrap.clientWidth;
  const H   = wrap.clientHeight;
  if (!W || !H) return;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}

window.addEventListener('resize', resize);
requestAnimationFrame(resize);

// ── Coordinate helpers ─────────────────────────────────────────
// Half court: (0,0)–(50,47) ft, baseline at y=47
// Full court: (0,0)–(94,50) ft

function computeTransform() {
  const W   = canvas.clientWidth  || canvas.width;
  const H   = canvas.clientHeight || canvas.height;
  const pad = 20;
  if (isPortraitFull()) {
    // Long axis (94ft) runs along H, short axis (50ft) along W.
    // px(x) → maps to screen-y after the reflection transform; py(y) → screen-x.
    const scale = Math.min((W - pad * 2) / 50, (H - pad * 2) / 94);
    T = { scale, ox: (H - 94 * scale) / 2, oy: (W - 50 * scale) / 2 };
    return;
  }
  const [fw, fh] = courtType === 'half' ? [50, 47] : [94, 50];
  const scale = Math.min((W - pad * 2) / fw, (H - pad * 2) / fh);
  T = { scale, ox: (W - fw * scale) / 2, oy: (H - fh * scale) / 2 };
}

const px = x => T.ox + x * T.scale;
const py = y => T.oy + y * T.scale;
const pr = r => r * T.scale;

// ── State ──────────────────────────────────────────────────────
let players   = [];    // { x, y, team, num }
let ball      = null;  // null | { x, y }
let undoStack = [];

// ── Player helpers ─────────────────────────────────────────────
function playerR() {
  return Math.max(18, Math.min(T.scale * 1.6, 26));
}

function ballR() {
  return Math.max(14, Math.min(T.scale * 1.3, 22));
}

function nextNum(team) {
  const used = new Set(players.filter(p => p.team === team).map(p => p.num));
  for (let n = 1; n <= 5; n++) if (!used.has(n)) return n;
  return players.filter(p => p.team === team).length + 1;
}

function hitPlayer(cx, cy) {
  const r = playerR() + 6;
  for (let i = players.length - 1; i >= 0; i--) {
    if (Math.hypot(players[i].x - cx, players[i].y - cy) <= r) return i;
  }
  return -1;
}

function hitBall(cx, cy) {
  if (!ball) return false;
  return Math.hypot(ball.x - cx, ball.y - cy) <= ballR() + 6;
}

function insideCourt(cx, cy) {
  const [fw, fh] = courtType === 'half' ? [50, 47] : [94, 50];
  return cx >= T.ox && cx <= T.ox + fw * T.scale
      && cy >= T.oy && cy <= T.oy + fh * T.scale;
}

function saveUndo() {
  undoStack.push({ players: JSON.parse(JSON.stringify(players)), ball: ball ? { ...ball } : null });
  if (undoStack.length > 40) undoStack.shift();
}

function undo() {
  if (!undoStack.length) return;
  const snap = undoStack.pop();
  players = snap.players;
  ball    = snap.ball;
  updateTokenStates();
  redraw();
}

function clearAll() {
  saveUndo();
  players = [];
  ball    = null;
  redraw();
  updateTokenStates();
}

// Visual feedback: dim team tokens when that team is full (5 players)
function updateTokenStates() {
  const offFull = players.filter(p => p.team === 'offense').length >= 5;
  const defFull = players.filter(p => p.team === 'defense').length >= 5;
  document.getElementById('tok-off').style.opacity = offFull ? '0.35' : '1';
  document.getElementById('tok-def').style.opacity = defFull ? '0.35' : '1';
  document.getElementById('tok-off').style.cursor  = offFull ? 'not-allowed' : 'grab';
  document.getElementById('tok-def').style.cursor  = defFull ? 'not-allowed' : 'grab';
}

// ── Drag state ─────────────────────────────────────────────────
// { type:'new'|'move', kind:'player'|'ball', team?, num?, idx?, cx, cy, onTrash }
let drag = null;

function clientToCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: clientX - r.left, y: clientY - r.top };
}

// In portrait-full mode the canvas uses a (x,y)↔(y,x) reflection transform,
// so pointer screen coords must be swapped to match the drawing storage space.
function clientToStorage(clientX, clientY) {
  const pos = clientToCanvas(clientX, clientY);
  if (isPortraitFull()) return { x: pos.y, y: pos.x };
  return pos;
}

function isOverCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return clientX >= r.left && clientX <= r.right
      && clientY >= r.top  && clientY <= r.bottom;
}

function isOverTrash(clientX, clientY) {
  const r = trashEl.getBoundingClientRect();
  return clientX >= r.left && clientX <= r.right
      && clientY >= r.top  && clientY <= r.bottom;
}

// ── Ghost DOM element helpers ───────────────────────────────────
function showGhostPlayer(team, num, clientX, clientY) {
  const color = team === 'offense' ? '#e8720c' : '#3a9fd6';
  const glow  = team === 'offense' ? 'rgba(232,114,12,0.6)' : 'rgba(58,159,214,0.6)';
  ghost.style.background         = color;
  ghost.style.backgroundImage    = 'none';
  ghost.style.backgroundSize     = '';
  ghost.style.backgroundRepeat   = '';
  ghost.style.backgroundPosition = '';
  ghost.style.boxShadow  = `0 0 16px ${glow}`;
  ghost.style.fontSize   = '17px';
  ghost.style.display    = 'flex';
  ghost.textContent      = String(num);
  moveGhost(clientX, clientY, false);
}

function showGhostBall(clientX, clientY) {
  ghost.style.background    = 'transparent';
  ghost.style.boxShadow     = 'none';
  ghost.style.fontSize      = '0';
  ghost.style.backgroundImage    = `url("${BALL_URL}")`;
  ghost.style.backgroundSize     = 'contain';
  ghost.style.backgroundRepeat   = 'no-repeat';
  ghost.style.backgroundPosition = 'center';
  ghost.style.display       = 'flex';
  ghost.textContent         = '';
  moveGhost(clientX, clientY, false);
}

function moveGhost(clientX, clientY, onTrash) {
  ghost.style.left    = clientX + 'px';
  ghost.style.top     = clientY + 'px';
  ghost.style.opacity = onTrash ? '0.25' : '0.85';
}

function hideGhost() {
  ghost.style.display = 'none';
}

// ── Drag start ─────────────────────────────────────────────────
function startNewPlayerDrag(team, clientX, clientY) {
  if (players.filter(p => p.team === team).length >= 5) return; // max 5
  const num = nextNum(team);
  const pos = clientToStorage(clientX, clientY);
  drag = { type: 'new', kind: 'player', team, num, cx: pos.x, cy: pos.y, onTrash: false };
  showGhostPlayer(team, num, clientX, clientY);
}

function startMovePlayerDrag(idx, clientX, clientY) {
  const pos = clientToStorage(clientX, clientY);
  const p   = players[idx];
  drag = { type: 'move', kind: 'player', idx, team: p.team, num: p.num, cx: pos.x, cy: pos.y, onTrash: false };
  showGhostPlayer(p.team, p.num, clientX, clientY);
  redraw();
}

function startNewBallDrag(clientX, clientY) {
  const pos = clientToStorage(clientX, clientY);
  drag = { type: 'new', kind: 'ball', cx: pos.x, cy: pos.y, onTrash: false };
  showGhostBall(clientX, clientY);
}

function startMoveBallDrag(clientX, clientY) {
  const pos = clientToStorage(clientX, clientY);
  drag = { type: 'move', kind: 'ball', cx: pos.x, cy: pos.y, onTrash: false };
  showGhostBall(clientX, clientY);
  redraw();
}

// ── Global pointer events ──────────────────────────────────────
document.getElementById('tok-off').addEventListener('pointerdown', e => {
  e.preventDefault();
  startNewPlayerDrag('offense', e.clientX, e.clientY);
});

document.getElementById('tok-def').addEventListener('pointerdown', e => {
  e.preventDefault();
  startNewPlayerDrag('defense', e.clientX, e.clientY);
});

document.getElementById('tok-ball').addEventListener('pointerdown', e => {
  e.preventDefault();
  startNewBallDrag(e.clientX, e.clientY);
});

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const pos = clientToStorage(e.clientX, e.clientY);
  // Ball takes priority (smaller, easier to miss)
  if (hitBall(pos.x, pos.y)) { startMoveBallDrag(e.clientX, e.clientY); return; }
  const idx = hitPlayer(pos.x, pos.y);
  if (idx >= 0) startMovePlayerDrag(idx, e.clientX, e.clientY);
});

document.addEventListener('pointermove', e => {
  if (!drag) return;
  e.preventDefault();
  const pos    = clientToStorage(e.clientX, e.clientY);
  drag.cx      = pos.x;
  drag.cy      = pos.y;
  drag.onTrash = isOverTrash(e.clientX, e.clientY);
  moveGhost(e.clientX, e.clientY, drag.onTrash);
  trashEl.classList.toggle('highlight', drag.onTrash && drag.type === 'move');
  redraw();
}, { passive: false });

document.addEventListener('pointerup', e => {
  if (!drag) return;
  const { type, kind, team, num, idx, cx, cy } = drag;
  const onTrash  = isOverTrash(e.clientX, e.clientY);
  const onCanvas = isOverCanvas(e.clientX, e.clientY);

  if (kind === 'player') {
    if (type === 'new') {
      if (onCanvas && insideCourt(cx, cy)) { saveUndo(); players.push({ x: cx, y: cy, team, num }); }
    } else {
      if (onTrash)       { saveUndo(); players.splice(idx, 1); }
      else if (onCanvas) { saveUndo(); players[idx].x = cx; players[idx].y = cy; }
    }
    updateTokenStates();
  } else { // ball
    if (type === 'new') {
      if (onCanvas && insideCourt(cx, cy)) { saveUndo(); ball = { x: cx, y: cy }; }
    } else {
      if (onTrash)       { saveUndo(); ball = null; }
      else if (onCanvas) { saveUndo(); ball.x = cx; ball.y = cy; }
    }
  }

  drag = null;
  hideGhost();
  trashEl.classList.remove('highlight');
  redraw();
});

// ── Draw court lines ───────────────────────────────────────────
function solidLine(lw) {
  ctx.strokeStyle = 'rgba(255,255,255,0.90)';
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.setLineDash([]);
}

function drawFloor(x, y, w, h, grainsVertical) {
  const g = ctx.createLinearGradient(
    x, y,
    grainsVertical ? x + w : x,
    grainsVertical ? y : y + h
  );
  g.addColorStop(0,   '#a85e28');
  g.addColorStop(0.4, '#c07035');
  g.addColorStop(0.6, '#c07035');
  g.addColorStop(1,   '#a85e28');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);

  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  const n = Math.round((grainsVertical ? w : h) / 6);
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    ctx.beginPath();
    if (grainsVertical) { const gx = x + t * w; ctx.moveTo(gx, y); ctx.lineTo(gx, y + h); }
    else                { const gy = y + t * h; ctx.moveTo(x, gy); ctx.lineTo(x + w, gy); }
    ctx.stroke();
  }
  ctx.restore();
}

function drawHalfCourt() {
  computeTransform();
  const lw = Math.max(1.5, T.scale * 0.09);

  drawFloor(px(0), py(0), pr(50), pr(47), true);
  ctx.save();
  ctx.beginPath(); ctx.rect(px(0), py(0), pr(50), pr(47)); ctx.clip();

  solidLine(lw);
  ctx.strokeRect(px(0), py(0), pr(50), pr(47));           // boundary
  ctx.strokeRect(px(17), py(28), pr(16), pr(19));          // paint

  // FT circle – solid upper half
  ctx.beginPath(); ctx.arc(px(25), py(28), pr(6), Math.PI, 0, false); ctx.stroke();
  // FT circle – dashed lower half
  ctx.setLineDash([lw * 3, lw * 2]);
  ctx.beginPath(); ctx.arc(px(25), py(28), pr(6), 0, Math.PI, false); ctx.stroke();
  ctx.setLineDash([]);

  // Backboard
  ctx.beginPath(); ctx.moveTo(px(22), py(43)); ctx.lineTo(px(28), py(43)); ctx.stroke();

  // Rim
  ctx.save(); ctx.strokeStyle = 'rgba(255,115,20,0.95)'; ctx.lineWidth = lw * 2;
  ctx.beginPath(); ctx.arc(px(25), py(41.75), pr(0.75), 0, Math.PI * 2); ctx.stroke();
  ctx.restore(); solidLine(lw);

  // Restricted area
  ctx.beginPath(); ctx.arc(px(25), py(41.75), pr(4), Math.PI, 0, false); ctx.stroke();

  // 3-point line
  const arcDy   = Math.sqrt(23.75 * 23.75 - 22 * 22); // ≈ 8.95 ft
  const cornerY = 41.75 - arcDy;
  ctx.beginPath(); ctx.moveTo(px(3),  py(47)); ctx.lineTo(px(3),  py(cornerY)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(47), py(47)); ctx.lineTo(px(47), py(cornerY)); ctx.stroke();
  const angL = Math.atan2(cornerY - 41.75,  3 - 25);
  const angR = Math.atan2(cornerY - 41.75, 47 - 25);
  ctx.beginPath(); ctx.arc(px(25), py(41.75), pr(23.75), angL, angR, false); ctx.stroke();

  // Centre-court semicircle
  ctx.setLineDash([lw * 2.5, lw * 1.5]);
  ctx.beginPath(); ctx.arc(px(25), py(0), pr(6), 0, Math.PI, false); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

function drawFullCourt() {
  computeTransform();
  const lw = Math.max(1, T.scale * 0.09);

  drawFloor(px(0), py(0), pr(94), pr(50), false);
  ctx.save();
  ctx.beginPath(); ctx.rect(px(0), py(0), pr(94), pr(50)); ctx.clip();

  solidLine(lw);
  ctx.strokeRect(px(0), py(0), pr(94), pr(50));

  ctx.beginPath(); ctx.moveTo(px(47), py(0)); ctx.lineTo(px(47), py(50)); ctx.stroke();
  ctx.beginPath(); ctx.arc(px(47), py(25), pr(6), 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px(47), py(25), pr(2), 0, Math.PI * 2); ctx.stroke();

  drawEnd(lw, false);
  drawEnd(lw, true);
  ctx.restore();
}

function drawEnd(lw, right) {
  const bx = right ? 88.75 : 5.25;
  solidLine(lw);
  ctx.strokeRect(right ? px(75) : px(0), py(17), pr(19), pr(16));

  const ftX = right ? px(75) : px(19);
  const ftY = py(25);
  ctx.beginPath();
  if (!right) ctx.arc(ftX, ftY, pr(6), -Math.PI / 2, Math.PI / 2, false);
  else        ctx.arc(ftX, ftY, pr(6),  Math.PI / 2, 3 * Math.PI / 2, false);
  ctx.stroke();
  ctx.setLineDash([lw * 3, lw * 2]);
  ctx.beginPath();
  if (!right) ctx.arc(ftX, ftY, pr(6),  Math.PI / 2, 3 * Math.PI / 2, false);
  else        ctx.arc(ftX, ftY, pr(6), -Math.PI / 2,     Math.PI / 2, false);
  ctx.stroke();
  ctx.setLineDash([]);

  const bbX = right ? px(90) : px(4);
  ctx.beginPath(); ctx.moveTo(bbX, py(22)); ctx.lineTo(bbX, py(28)); ctx.stroke();

  ctx.save(); ctx.strokeStyle = 'rgba(255,115,20,0.95)'; ctx.lineWidth = lw * 2;
  ctx.beginPath(); ctx.arc(px(bx), py(25), pr(0.75), 0, Math.PI * 2); ctx.stroke();
  ctx.restore(); solidLine(lw);

  ctx.beginPath();
  if (!right) ctx.arc(px(bx), py(25), pr(4), -Math.PI / 2, Math.PI / 2, false);
  else        ctx.arc(px(bx), py(25), pr(4),  Math.PI / 2, 3 * Math.PI / 2, false);
  ctx.stroke();

  const arcDx = Math.sqrt(23.75 * 23.75 - 22 * 22);
  const arcX  = right ? bx - arcDx : bx + arcDx;
  const baseX = right ? px(94) : px(0);
  ctx.beginPath(); ctx.moveTo(baseX, py(3));  ctx.lineTo(px(arcX), py(3));  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(baseX, py(47)); ctx.lineTo(px(arcX), py(47)); ctx.stroke();
  const angTop = Math.atan2( 3 - 25, arcX - bx);
  const angBot = Math.atan2(47 - 25, arcX - bx);
  ctx.beginPath(); ctx.arc(px(bx), py(25), pr(23.75), angTop, angBot, right); ctx.stroke();
}

// ── Draw basketball ────────────────────────────────────────────
function drawBall(x, y, alpha) {
  const r = ballR();
  ctx.save();
  ctx.globalAlpha = alpha;
  if (basketballImg.complete && basketballImg.naturalWidth) {
    ctx.shadowColor = 'rgba(80,20,0,0.55)';
    ctx.shadowBlur  = alpha > 0.5 ? 12 : 5;
    ctx.drawImage(basketballImg, x - r, y - r, r * 2, r * 2);
  } else {
    // Fallback: solid orange circle
    ctx.fillStyle = '#e8720c';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// ── Draw players ───────────────────────────────────────────────
function drawPlayer(x, y, team, num, alpha) {
  const r      = playerR();
  const color  = team === 'offense' ? '#e8720c' : '#3a9fd6';
  const border = team === 'offense' ? 'rgba(255,176,96,0.9)' : 'rgba(144,212,255,0.9)';

  ctx.save();
  ctx.globalAlpha = alpha;

  ctx.shadowColor = color;
  ctx.shadowBlur  = alpha > 0.5 ? 10 : 4;
  ctx.fillStyle   = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = border;
  ctx.lineWidth   = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();

  ctx.fillStyle    = '#fff';
  ctx.font         = `800 ${Math.round(r * 0.82)}px system-ui`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), x, y + 0.5);

  ctx.restore();
}

function drawObjects() {
  // Ball
  if (ball) {
    const isBallMoved = drag && drag.kind === 'ball' && drag.type === 'move';
    drawBall(ball.x, ball.y, isBallMoved ? 0.25 : 1.0);
  }
  if (drag && drag.kind === 'ball' && drag.type === 'move') {
    drawBall(drag.cx, drag.cy, drag.onTrash ? 0.15 : 0.65);
  }

  // Players
  players.forEach((p, i) => {
    const isMoved = drag && drag.kind === 'player' && drag.type === 'move' && drag.idx === i;
    drawPlayer(p.x, p.y, p.team, p.num, isMoved ? 0.25 : 1.0);
  });
  if (drag && drag.kind === 'player' && drag.type === 'move') {
    const p = players[drag.idx];
    drawPlayer(drag.cx, drag.cy, p.team, p.num, drag.onTrash ? 0.15 : 0.65);
  }
}

// ── Redraw ─────────────────────────────────────────────────────
function redraw() {
  const W = canvas.clientWidth  || canvas.width;
  const H = canvas.clientHeight || canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  if (courtType === 'half') {
    drawHalfCourt();
    drawObjects();
  } else if (isPortraitFull()) {
    // Apply reflection transform (x,y)↔(y,x) so the court's long axis (94ft)
    // runs vertically and fills the portrait screen height.
    ctx.save();
    ctx.transform(0, 1, 1, 0, 0, 0);
    drawFullCourt();
    drawObjects();
    ctx.restore();
  } else {
    drawFullCourt();
    drawObjects();
  }
}

// ── Court toggle ────────────────────────────────────────────────
function setCourt(t) {
  if (courtType === t) return;
  courtType = t;
  // Clear all objects when switching court type
  players   = [];
  ball      = null;
  undoStack = [];
  updateTokenStates();
  document.getElementById('btn-half').classList.toggle('active', t === 'half');
  document.getElementById('btn-full').classList.toggle('active', t === 'full');
  redraw();
}
</script>
